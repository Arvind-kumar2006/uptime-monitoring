version: '3.8'

services:
  backend:
    build: ./backend
    container_name: uptime-backend
    ports:
      - "4000:4000"
    volumes:
      - backend-data:/app/data
    environment:
      - PORT=4000
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      args:
        # Browser-side code, so this must point to the backend's host-mapped port
        VITE_API_URL: http://localhost:4000
    container_name: uptime-frontend
    ports:
      - "5173:80"
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-data:
